<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MemoryVerse</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="page-shell">
      <main class="layout">
        <aside class="panel controls-panel">
          <section class="panel-intro">
            <h1 class="panel-title">MemoryVerse</h1>
          </section>

          <form id="passage-form" class="stack">
            <div class="field">
              <label for="reference-input">Verse or range</label>
              <input
                id="reference-input"
                name="reference"
                type="text"
                value="John 3:16-17"
                placeholder="Psalm 23:1-4"
                autocomplete="off"
              >
            </div>

            <div class="field">
              <label for="translation-select">Translation</label>
              <select id="translation-select" name="translation">
                <option value="NLT">New Living Translation (NLT)</option>
                <option value="KJV">King James Version (KJV)</option>
                <option value="NLTUK">New Living Translation UK (NLTUK)</option>
                <option value="NTV">Nueva Traduccion Viviente (NTV)</option>
              </select>
            </div>

            <button type="submit" class="primary-button">Load Passage</button>
          </form>

          <div class="stats-grid">
            <article class="stat-card">
              <span class="stat-label">Chunks mastered</span>
              <strong id="progress-value">--</strong>
            </article>
            <article class="stat-card">
              <span class="stat-label">Support level</span>
              <strong id="support-value">--</strong>
            </article>
          </div>

          <section class="chunk-list-section">
            <p class="rule-title">Chunk plan</p>
            <div id="chunk-list" class="chunk-list"></div>
          </section>
        </aside>

        <section class="panel practice-panel">
          <div class="practice-header">
            <div>
              <p class="eyebrow">Practice</p>
              <h2 id="passage-title">Load a passage to begin.</h2>
            </div>
            <div class="practice-actions">
              <button type="button" id="restart-button" class="ghost-button">Restart Session</button>
            </div>
          </div>

          <p id="status-message" class="status-message">
            Choose a verse or range to begin.
          </p>

          <article id="practice-card" class="passage-card is-empty" aria-live="polite">
            <div class="empty-state">
              <p class="empty-kicker">MemoryVerse</p>
              <p>Load a passage to begin.</p>
            </div>
          </article>

          <form id="answer-form" class="answer-row">
            <div id="answer-field" class="field answer-field">
              <label for="guess-input">Next word</label>
              <input
                id="guess-input"
                name="guess"
                type="text"
                placeholder="Load a passage first"
                autocomplete="off"
                disabled
              >
            </div>
            <button type="submit" id="answer-submit-button" class="primary-button">Help</button>
          </form>
        </section>
      </main>
    </div>

    <script type="module" src="/optimized.js"></script>
  </body>
</html>
